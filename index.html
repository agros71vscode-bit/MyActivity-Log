<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Journal</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:10px;
    background:#f9f9f9;
    font-size:18px;
}
h2{color:#333;}
input,select,textarea,button{
    margin:8px;
    padding:12px;
    font-size:16px;
}
textarea{
    width:100%;
    box-sizing:border-box;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:#fff;
}
th,td{
    border:1px solid #ccc;
    padding:12px;
    text-align:left;
    vertical-align:top;
}
th{background:#f4f4f4;}
.actions button{margin-right:5px;}
#searchBar{
    width:100%;
    box-sizing:border-box;
}
.toolbar button{
    background:#4CAF50;
    color:white;
    border:none;
    cursor:pointer;
}
.toolbar button:hover{
    background:#45a049;
}
@media(max-width:600px){
    table{font-size:14px;}
    button{
        width:100%;
        margin-top:10px;
    }
}
</style>
</head>

<body>

<h2>My Journal</h2>

<input type="datetime-local" id="dateInput">

<select id="categoryInput">
    <option>Daily Log</option>
    <option>Emotional Outlet</option>
    <option>Goal Tracking</option>
    <option>Creative Space</option>
    <option>Self-Reflection</option>
</select>

<textarea id="entryInput" rows="5" placeholder="Write your thoughts here..."></textarea>

<button onclick="addEntry()">Save Entry</button>

<input type="text" id="searchBar"
placeholder="Search by keyword, category or date..."
onkeyup="filterEntries()">

<div class="toolbar">
    <button onclick="exportJournal()">Export TXT</button>
    <button onclick="exportJournalCSV()">Export CSV</button>

    <!-- GitHub export disabled for local-only version -->
    <!--
    <button onclick="exportToGitHubCSV()">Export GitHub</button>
    -->

    <input type="file" id="importFile"
    style="display:none"
    accept=".txt"
    onchange="importJournal(event)">

    <button onclick="document.getElementById('importFile').click()">
        Import TXT
    </button>
</div>

<table id="journalTable">
<thead>
<tr>
<th>Date/Time</th>
<th>Category</th>
<th>Entry</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let journal = JSON.parse(localStorage.getItem("journal")) || [];

/* Upgrade older entries */
journal = journal.map(item => {
    if(!item.id){
        item.id = Date.now() + Math.random();
    }
    return item;
});

function saveJournal(){
    localStorage.setItem("journal", JSON.stringify(journal));
}

function escapeHTML(text){
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

function setCurrentDateTime() {

    const now = new Date();

    now.setMinutes(
        now.getMinutes() - now.getTimezoneOffset()
    );

    document.getElementById("dateInput").value =
        now.toISOString().slice(0,16);
}

function renderTable(data = journal){

    const tbody = document.querySelector("#journalTable tbody");
    tbody.innerHTML = "";

    data.forEach(item=>{

        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${escapeHTML(item.date)}</td>
        <td>${escapeHTML(item.category)}</td>
        <td>${escapeHTML(item.entry)}</td>
        <td class="actions">
            <button onclick="editEntry(${item.id})">Edit</button>
            <button onclick="deleteEntry(${item.id})">Delete</button>
        </td>
        `;

        tbody.appendChild(row);
    });

    saveJournal();
}

function addEntry(){

    const date = document.getElementById("dateInput").value;
    const category = document.getElementById("categoryInput").value;
    const entry = document.getElementById("entryInput").value.trim();

    if(!date || !entry){
        alert("Please fill in all fields.");
        return;
    }

    journal.push({
        id: Date.now(),
        date,
        category,
        entry
    });

    journal.sort(
        (a,b)=>new Date(b.date)-new Date(a.date)
    );

    document.getElementById("entryInput").value = "";
    setCurrentDateTime();

    renderTable();
}

function editEntry(id){

    const index = journal.findIndex(x=>x.id===id);
    if(index === -1) return;

    const newDate = prompt(
        "Edit date/time",
        journal[index].date
    );

    if(newDate === null) return;

    const newCategory = prompt(
        "Edit category",
        journal[index].category
    );

    if(newCategory === null) return;

    const newEntry = prompt(
        "Edit entry",
        journal[index].entry
    );

    if(newEntry === null) return;

    journal[index].date = newDate;
    journal[index].category = newCategory;
    journal[index].entry = newEntry;

    renderTable();
}

function deleteEntry(id){

    if(!confirm("Delete this entry?")){
        return;
    }

    journal = journal.filter(x=>x.id!==id);

    renderTable();
}

function filterEntries(){

    const query =
        document.getElementById("searchBar")
        .value
        .toLowerCase();

    const filtered = journal.filter(item =>
        item.date.toLowerCase().includes(query) ||
        item.category.toLowerCase().includes(query) ||
        item.entry.toLowerCase().includes(query)
    );

    renderTable(filtered);
}

function exportJournal(){

    if(journal.length===0){
        alert("No entries to export.");
        return;
    }

    let content = "My Journal Entries\n\n";

    journal.forEach(item=>{
        content +=
`Date/Time: ${item.date}
Category: ${item.category}
Entry: ${item.entry}
---
`;
    });

    const blob = new Blob([content], {type:"text/plain"});

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "journal.txt";
    link.click();
}

function exportJournalCSV(){

    if(journal.length===0){
        alert("No entries to export.");
        return;
    }

    let csv = "Date/Time,Category,Entry\n";

    journal.forEach(item=>{

        const safeEntry =
            item.entry.replace(/"/g,'""');

        csv += `"${item.date}","${item.category}","${safeEntry}"\n`;
    });

    const blob = new Blob([csv], {type:"text/csv"});

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "journal.csv";
    link.click();
}

function importJournal(event){

    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){

        const blocks = e.target.result.split("---\n");

        blocks.forEach(block=>{

            const dateMatch =
                block.match(/Date\/Time: (.+)/);

            const categoryMatch =
                block.match(/Category: (.+)/);

            const entryMatch =
                block.match(/Entry: ([\s\S]+)/);

            if(dateMatch && categoryMatch && entryMatch){

                const newItem = {
                    id: Date.now() + Math.random(),
                    date: dateMatch[1].trim(),
                    category: categoryMatch[1].trim(),
                    entry: entryMatch[1].trim()
                };

                const exists = journal.some(j=>
                    j.date===newItem.date &&
                    j.category===newItem.category &&
                    j.entry===newItem.entry
                );

                if(!exists){
                    journal.push(newItem);
                }
            }
        });

        journal.sort(
            (a,b)=>new Date(b.date)-new Date(a.date)
        );

        renderTable();

        alert("Journal imported successfully.");
    };

    reader.readAsText(file);
}

setCurrentDateTime();
renderTable();

</script>

</body>
</html>
